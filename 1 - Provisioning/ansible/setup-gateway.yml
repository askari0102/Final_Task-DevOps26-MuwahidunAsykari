---
# Nginx, Certbot, SSL Wildcard & DNS Setup
- name: Setup Gateway
  hosts: gateway
  become: true

  tasks:
    # ─── Cloudflare DNS (Automated Wildcard DNS) ──────────────────────────────
    - name: Create DNS A Record for Root Domain
      community.general.cloudflare_dns:
        zone: "studentdumbways.my.id"
        record: "{{ domain_name }}"  
        type: A
        value: "{{ ansible_host }}" 
        api_token: "{{ cloudflare_api_token }}"
        proxied: false

    - name: Create DNS A Records for specific subdomains
      community.general.cloudflare_dns:
        zone: "studentdumbways.my.id"
        record: "{{ item }}.{{ domain_name }}" 
        type: A
        value: "{{ ansible_host }}" 
        api_token: "{{ cloudflare_api_token }}"
        proxied: false
      loop:
        - "exporter"    
        - "prom"        
        - "monitoring"  
        - "registry"    
        - "staging"     
        - "api.staging" 
        - "api"         

    # ─── Install Packages ─────────────────────────────────────────────────────
    - name: Install Nginx, apache2-utils, and Certbot
      apt:
        name:
          - nginx
          - apache2-utils
          - certbot
          - python3-certbot-nginx
          - python3-certbot-dns-cloudflare
        state: present
        update_cache: yes

    # ─── Certbot ──────────────────────────────────────────────────────────────
    - name: Create Cloudflare credentials directory
      file:
        path: /etc/letsencrypt
        state: directory

    - name: Create Cloudflare credentials file
      copy:
        dest: /etc/letsencrypt/cloudflare.ini
        content: |
          dns_cloudflare_api_token = {{ cloudflare_api_token }}
        mode: '0600'

    - name: Obtain wildcard SSL certificate
      command: >
        certbot certonly
        --dns-cloudflare
        --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini
        --dns-cloudflare-propagation-seconds 60
        -d "{{ domain_name }}"
        -d "*.{{ domain_name }}"
        -d "*.staging.{{ domain_name }}"
        --email {{ certbot_email }}
        --agree-tos
        --non-interactive
      args:
        creates: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem

    # ─── Nginx Configuration ──────────────────────────────────────────────────
    - name: Create htpasswd file for Prometheus basic auth
      command: htpasswd -bc /etc/nginx/.htpasswd {{ prometheus_basic_auth_user }} {{ prometheus_basic_auth_password }}

    - name: Create htpasswd for Docker Registry
      command: htpasswd -bc /etc/nginx/.htpasswd_registry {{ registry_user }} {{ registry_password }}
      
    - name: Deploy Nginx config
      template:
        src: nginx-gateway.j2
        dest: /etc/nginx/conf.d/default.conf
        owner: root
        group: root
        mode: '0644'

    - name: Remove default Nginx config
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test Nginx config
      command: nginx -t

    - name: Start, enable, and reload Nginx
      service:
        name: nginx
        state: reloaded
        enabled: yes

    # ─── Auto Renewal ─────────────────────────────────────────────────────────
    - name: Create SSL auto renewal script
      copy:
        dest: /usr/local/bin/ssl-renew.sh
        content: |
          #!/bin/bash
          certbot renew --quiet --post-hook "systemctl reload nginx"
        mode: '0755'

    - name: Setup cronjob for SSL auto renewal
      cron:
        name: "SSL auto renewal"
        minute: "0"
        hour: "0"
        day: "1"
        month: "*"
        weekday: "*"
        job: "/usr/local/bin/ssl-renew.sh"