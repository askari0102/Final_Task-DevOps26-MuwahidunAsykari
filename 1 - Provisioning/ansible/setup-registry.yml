---
# Docker Registry Private
- name: Setup Registry
  hosts: monitoring
  become: true

  tasks:
    # ─── Create Directory ─────────────────────────────────────────────────────
    - name: Create registry directory for new user
      file:
        path: /home/{{ new_user }}/registry
        state: directory
        owner: "{{ new_user }}"
        group: "{{ new_user }}"
        mode: '0755'

    # ─── Deploy Compose ───────────────────────────────────────────────────────
    - name: Deploy docker-compose registry
      template:
        src: docker-compose-registry.j2
        dest: /home/{{ new_user }}/registry/docker-compose.yml
        owner: "{{ new_user }}"
        group: "{{ new_user }}"
        mode: '0644'

    # ─── Run Compose ──────────────────────────────────────────────────────────
    - name: Run docker compose
      community.docker.docker_compose_v2:
        project_src: /home/{{ new_user }}/registry
        state: present
      become: yes
      become_user: "{{ new_user }}"