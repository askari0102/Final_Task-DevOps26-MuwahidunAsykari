apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-dumbmerch
  namespace: production
  labels:
    app: fe-dumbmerch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe-dumbmerch
  template:
    metadata:
      labels:
        app: fe-dumbmerch
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: fe-dumbmerch
          image: registry.asykari.studentdumbways.my.id/fe-dumbmerch:production-dbf21b1a
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: REACT_APP_BASEURL
              value: "https://api.asykari.studentdumbways.my.id/api/v1"

---
apiVersion: v1
kind: Service
metadata:
  name: fe-dumbmerch-svc
  namespace: production
spec:
  selector:
    app: fe-dumbmerch
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fe-dumbmerch-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: asykari.studentdumbways.my.id
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fe-dumbmerch-svc
                port:
                  number: 80